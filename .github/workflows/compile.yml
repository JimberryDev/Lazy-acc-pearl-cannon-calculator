name: Build and Release LazyAccCannon

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ['windows-latest', 'ubuntu-latest', 'macos-latest']

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # --- Build pretty ---
      - name: Build pretty
        run: |
          pyinstaller --noconfirm LazyAccCannonCalc.spec

      # --- Build cheap variant ---
      - name: Build cheap
        run: |
          pyinstaller --noconfirm LazyAccCannonCalc.spec -- --cheap

      # --- Debug: list outputs ---
      - name: List dist contents
        shell: bash
        run: |
          ls -R dist

      # --- Upload artifacts ---
      - name: Upload pretty artifact
        uses: actions/upload-artifact@v6
        with:
          name: LazyAccCannonCalc-${{ matrix.os }}-pretty
          path: dist/LazyAccCannonCalc*

      - name: Upload cheap artifact
        uses: actions/upload-artifact@v6
        with:
          name: LazyAccCannonCalc-${{ matrix.os }}-cheap
          path: dist/LazyAccCannonCalcCheap*

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets

      - name: Show downloaded artifacts
        shell: bash
        run: |
          ls -R release-assets

      - name: Copy schems with tag
        shell: bash
        run: |
          mkdir -p release-extra
          for file in schems/*; do
            base="$(basename "$file")"
            stem="${base%.*}"
            ext="${base##*.}"
            new_name="${stem}_${GITHUB_REF_NAME}.${ext}"
            cp "$file" "release-extra/${new_name}"
          done
          ls -R release-extra

      - name: Create GitHub release and upload assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create "$GITHUB_REF_NAME" \
            $(find release-assets -type f) \
            release-extra/* \
            --generate-notes \
            --verify-tag